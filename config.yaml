mode: safe
min_otm_pct: 7.0
min_bid: 0.05
min_open_interest: 2
lookahead_days: 28
diversify_split: 0.5
recipient_email: ambrish@gmail.com
portfolio_path: ./snapshots/
cache_path: ./cache/
log_path: ./logs/
pipeline_time_et: "10:15"
portfolio_pull_time_et: "02:30"

# ── Collar Mode (v1.5) ──────────────────────────────────────────
collar_pipeline_time_et: "10:00"     # Saturday 10:00 AM ET = 7:00 AM PT
collar_min_holding_value: 10000      # min current market value ($) to qualify
collar_dte_min: 28                   # min DTE (4 weeks)
collar_dte_max: 112                  # max DTE (16 weeks)
collar_call_otm_min_pct: 10.0        # call strike >= this % above current price
collar_call_otm_max_pct: 40.0        # call strike <= this % above current price (rejects corrupt/legacy data)
collar_put_otm_max_pct: 10.0         # put strike <= this % below current price
collar_min_open_interest: 6          # min OI on each leg (> 5)
collar_min_net_gain_per_share: 0.10  # min net gain (CC mid - LP mid) per share

# ── Credit Spread Mode (v1.6) ────────────────────────────────────
spread_dte_min: 14               # minimum DTE for spread scans (2 weeks)
spread_dte_max: 42               # maximum DTE for spread scans (6 weeks)
spread_size_min_pct: 1.0         # minimum spread width as % of stock price (range lower bound)
spread_size_max_pct: 10.0        # maximum spread width as % of stock price (range upper bound)
spread_min_premium_pct: 1.0      # minimum net credit as % of stock price to qualify
spread_short_otm_pct: 10.0       # minimum OTM% for the short leg
spread_min_open_interest: 2      # minimum OI on both legs
