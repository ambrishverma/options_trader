mode: safe
min_otm_pct: 10.0
min_bid: 1.0
min_open_interest: 2
lookahead_days: 28
diversify_split: 0.5
recipient_email: ambrish@gmail.com
portfolio_path: ./snapshots/
cache_path: ./cache/
log_path: ./logs/
pipeline_time_et: "10:15"
portfolio_pull_time_et: "02:30"

# ── Collar Mode (v1.5) ──────────────────────────────────────────
collar_min_holding_value: 50000  # min current market value ($) to qualify
collar_dte_min: 28                   # min DTE (4 weeks)
collar_dte_max: 112                  # max DTE (16 weeks)
collar_call_otm_min_pct: 10.0        # call strike >= this % above current price
collar_call_otm_max_pct: 40.0        # call strike <= this % above current price (rejects corrupt/legacy data)
collar_put_otm_max_pct: 10.0         # put strike <= this % below current price
collar_min_open_interest: 6          # min OI on each leg (> 5)
collar_min_net_gain_per_share: 0.5  # min net gain (CC mid - LP mid) per share

# ── Credit Spread Mode (v1.6) ────────────────────────────────────
spread_dte_min: 14               # minimum DTE for spread scans (2 weeks)
spread_dte_max: 42               # maximum DTE for spread scans (6 weeks)
spread_size_min_pct: 1.0         # minimum spread width as % of stock price (range lower bound)
spread_size_max_pct: 10.0        # maximum spread width as % of stock price (range upper bound)
spread_min_premium_pct: 1.0      # minimum net credit as % of stock price to qualify
spread_short_otm_pct: 10.0       # minimum OTM% for the short leg
spread_min_open_interest: 2      # minimum OI on both legs
spread_min_pop: 70.0             # minimum POP% (probability of profit) to qualify
spread_top_n: 1                  # return top N candidates per symbol (1 = single best)
risk_free_rate: 4.3              # risk-free rate for Black-Scholes delta (in %, e.g. 4.3 = 4.3%)

# ── Find Insurance — Protective PDS (v2.3) ──────────────────────────
insurance_max_deductible_pct: 10.0   # max deductible as % of price (long leg upper bound = this % below price)
insurance_min_coverage_pct: 10.0     # min coverage band as % of price (spread width lower bound)
insurance_max_ppp: 1.0               # max PPP% (premium/price) to include in daily report
insurance_max_iv_rank: 50            # max IV rank to include in daily report
auto_defense: true                   # enable/disable auto PDS insurance purchasing in daily pipeline
auto_defense_max_ppp: 0.5            # max PPP% for auto-purchase of PDS insurance
auto_defense_max_iv_rank: 25         # max IV rank for auto-purchase of PDS insurance

# ── Insurance — Debit Spreads (v2.0) ─────────────────────────────
debit_min_holding_value: 10000       # min market value ($) for PDS eligibility
debit_spread_size_min_pct: 5.0  # min spread width as % of stock price
debit_spread_size_max_pct: 25.0  # max spread width as % of stock price
debit_dte_min: 5  # minimum DTE for debit scans
debit_dte_max: 60                    # maximum DTE for debit scans
debit_max_debit_pct: 25.0            # max net debit as % of spread width
debit_long_leg_offset_pct: 5.0       # long leg strike offset from ATM (strikes within 5% of price)
debit_max_dpd_pct: 10.0  # max DPD as % of stock value per contract
debit_min_open_interest: 2           # min OI on both legs

# ── Spread Optimize (v1.9) ───────────────────────────────────────
spread_optimize_decay_pct: 75.0      # close when spread lost this % of value
spread_optimize_limit_pct: 25.0      # max close price as % of original premium
spread_optimize_min_dte: 5           # minimum DTE to qualify for optimize (default 5 days)

# ── Short Contract Safety (v1.9) ─────────────────────────────────
safety_gain_pct: 40.0                # close when option gained this % against you
safety_limit_pct: 20.0               # max close price as (1 + pct) × orig_credit
safety_min_dte: 5                    # minimum DTE to qualify for safety (default 5 days)

# ── Options Trade Report (v1.7) ──────────────────────────────────
report_time_et: "22:00"          # Daily 10:00 PM ET = 7:00 PM PT
weekly_report_time_et: "09:00"   # Weekly Saturday 9:00 AM ET = 6:00 AM PT

# -- Income Generator (v1.8) -------------------------------------------------
ig_min_cl_ratio: 0.2  # min credit/loss ratio to consider a spread
ig_risk_factor: 1.0  # quantity multiplier (0.5=conservative, 2.0=aggressive)
ig_max_contracts_per_equity: 5   # hard cap on contracts per symbol per run
ig_enabled: true                 # master switch (false = force preview mode)
ig_min_daily_income_goal: 1000.0  # daily income target ($); 0 = no goal chasing
ig_cl_ratio_buffer: 0.03  # max CL ratio buffer below ig_min_cl_ratio for goal chasing
ig_non_strategy_purchase: true  # Pass-3: buy daily CCS/PCS recs if goal not met after Pass-1/2
auto_income: true  # auto-purchase spreads during daily pipeline run
ig_non_strategy_max_contracts: 5  # hard cap per symbol for Pass-3 non-strategy buys

# -- Email Display Filters (v2.2) ------------------------------------------------
email_min_spread_net_credit: 50.0    # min net credit ($) to show CCS/PCS in email
email_min_spread_cl_ratio: 0.20      # min credit/loss ratio to show CCS/PCS in email
email_min_spread_ypd: 5.0            # min YPD ($/day) to show CCS/PCS in email

# -- Market Move Trigger (v2.1) -----------------------------------------------
market_move_trigger_pct: 1.0     # % move in QQQ or SPY to trigger rerun
market_check_times_pt:           # PT times to check for big moves (trading days only)
  - "08:15"
  - "09:15"
  - "10:15"
  - "11:15"
  - "12:15"
